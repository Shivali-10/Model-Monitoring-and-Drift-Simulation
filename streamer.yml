name: Cloud Live Streamer

on:
  schedule:
    # Runs at 00:00 every Monday (You can customize this Cron syntax)
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allows you to manually trigger it from the GitHub website!

jobs:
  run-streamer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          pip install pandas requests python-dotenv
          
      - name: Run Live Streamer Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # This variable tells our Python script to run the "Single Shot" cloud mode!
          GITHUB_ACTIONS: "true" 
        run: |
          python live_streamer.py
